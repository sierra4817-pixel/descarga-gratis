<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CÓDIGO ALFA VIP — El Estándar Superior</title>
  
  <style>
    :root {
      --deep-bg: #02060f; /* Azul abisal premium */
      --card-bg: #050a18;
      --accent-green: #9dfc52; /* Verde acción de alta visibilidad */
      --gold: #c5a059;
      --text-main: #ffffff;
      --text-dim: #8492a6;
      --gradient-main: linear-gradient(135deg, #050a18 0%, #02060f 100%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background-color: var(--deep-bg);
      color: var(--text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Fondo Dinámico con textura de poder */
    .bg-texture {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 80% 20%, rgba(157, 252, 82, 0.03), transparent 40%),
                  radial-gradient(circle at 20% 80%, rgba(197, 160, 89, 0.05), transparent 40%);
      z-index: -1;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 60px 24px; }

    /* Header con Identidad Definida */
    header { text-align: center; margin-bottom: 80px; }
    .logo { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(197,160,89,0.3)); }
    .top-label { font-size: 12px; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; font-weight: 700; }

    /* Hero Section - Comunicación Directa */
    .hero { text-align: center; margin-bottom: 80px; }
    h1 { font-size: clamp(32px, 7vw, 64px); font-weight: 900; line-height: 1.1; letter-spacing: -2px; margin-bottom: 25px; }
    .highlight { color: var(--accent-green); }
    .hero p { font-size: 20px; color: var(--text-dim); max-width: 700px; margin: 0 auto; font-weight: 300; }

    /* Estética de las capturas: Secciones de Beneficios */
    .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 80px; }
    .feature-card {
      background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
      padding: 40px; border-radius: 20px; position: relative; transition: 0.3s;
    }
    .feature-card:hover { border-color: var(--accent-green); transform: translateY(-5px); }
    .feature-card i { font-size: 40px; color: var(--accent-green); display: block; margin-bottom: 20px; }
    .feature-card h3 { font-size: 22px; margin-bottom: 15px; }
    .feature-card p { color: var(--text-dim); font-size: 15px; }

    /* El "Vault" (Caja de Captura) */
    .vault-section {
      background: var(--gradient-main); border: 1px solid var(--gold);
      border-radius: 30px; padding: 60px; display: grid; grid-template-columns: 1fr 1fr;
      gap: 50px; align-items: center; box-shadow: 0 50px 100px rgba(0,0,0,0.5);
    }

    .book-mockup { width: 100%; border-radius: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

    /* Formulario de Alta Conversión */
    .form-box h2 { font-size: 28px; margin-bottom: 25px; }
    .input-group { margin-bottom: 20px; }
    input {
      width: 100%; padding: 20px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      color: white; font-size: 16px; transition: 0.3s;
    }
    input:focus { border-color: var(--accent-green); outline: none; background: rgba(157, 252, 82, 0.05); }
