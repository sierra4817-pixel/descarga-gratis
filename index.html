<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código Alfa - Libro Gratuito</title>
    <style>
        body { background-color: #0d0d0d; color: #ffffff; font-family: 'Helvetica', sans-serif; text-align: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 450px; margin: auto; border: 1px solid #d4af37; padding: 30px; border-radius: 15px; background: #1a1a1a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #d4af37; letter-spacing: 2px; font-size: 24px; text-transform: uppercase; }
        p { color: #cccccc; line-height: 1.6; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        button { background-color: #d4af37; color: #000; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; transition: 0.3s; }
        button:hover { background-color: #ffffff; }
        .footer { font-size: 11px; color: #555; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DOMINA TU CAMINO</h1>
        <p>Estás a un paso de la <strong>Estructura del 1%</strong>. Deja tu correo para recibir el libro digital gratuito.</p>
        
        <form action="#" method="POST">
            <input type="text" name="name" placeholder="Tu nombre" required>
            <input type="email" name="email" placeholder="Tu correo electrónico" required>
            <button type="submit">OBTENER ACCESO INMEDIATO</button>
        </form>
        
        <div class="footer">Únete a la élite de Código Alfa. Privacidad 100% garantizada.</div>
    </div>
</body>
</html>
