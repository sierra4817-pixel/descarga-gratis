<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CÓDIGO ALFA VIP</title>
  
  <style>
    :root {
      --bg: #000000;
      --gold: #AD935B; /* Oro envejecido, menos amarillento */
      --white: #FFFFFF;
      --muted: #444444;
      --card-bg: #080808;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--white);
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; }

    /* Header Minimalista */
    header { text-align: left; margin-bottom: 100px; border-left: 3px solid var(--gold); padding-left: 20px; }
    .logo-img { width: 90px; filter: grayscale(1); margin-bottom: 15px; }
    .brand { letter-spacing: 5px; font-weight: 300; font-size: 14px; text-transform: uppercase; color: var(--gold); }

    /* Layout Principal */
    .hero { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }

    /* Texto de Autoridad */
    .hero-content h1 {
      font-size: 64px; font-weight: 800; line-height: 0.9; letter-spacing: -3px; margin-bottom: 30px;
    }
    .hero-content p {
      font-size: 20px; color: #888; max-width: 450px; font-weight: 300; margin-bottom: 40px;
    }

    /* Caja de Captura tipo 'Vault' */
    .vault-box {
      background: var(--card-bg);
      border: 1px solid #111;
      padding: 50px;
      border-radius: 4px; /* Bordes rectos son más serios */
    }

    h2 { font-size: 24px; margin-bottom: 30px; font-weight: 500; letter-spacing: -0.5px; }

    /* Inputs Estilo Terminal de Lujo */
    input {
      width: 100%; padding: 18px 0; margin-bottom: 30px;
      background: transparent; border: none; border-bottom: 1px solid var(--muted);
      color: white; font-size: 16px; transition: 0.3s; border-radius: 0;
    }
    input:focus { border-bottom-color: var(--gold); outline: none; }

    /* Botón de Acción Directa */
    .btn-vip {
      width: 100%; padding: 20px; border: 1px solid var(--gold);
      background: transparent; color: var(--gold);
      font-weight: 700; font-size: 14px; text-transform: uppercase;
      letter-spacing: 3px; cursor: pointer; transition: 0.4s;
    }
    .btn-vip:hover { background: var(--gold); color: black; }

    /* Imagen de la Guía */
    .guide-img {
      width: 100%; max-width: 320px; filter: contrast(1.1) brightness(0.9);
      margin-top: 40px; border: 1px solid #111;
    }

    footer {
      margin-top: 150px; padding: 40px 0; border-top: 1px solid #111;
      text-align: left; font-size: 11px; color: #333; letter-spacing: 2px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-contact { color: #666; text-decoration: none; }

    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; gap: 50px; }
      .hero-content h1 { font-size: 48px; }
      header { margin-bottom: 60px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <img src="https://i.ibb.co/image-png-4e57df51-d15b-43b3-8d19-87a051725aa2.png" alt="CÓDIGO ALFA" class="logo-img">
      <div class="brand">Albert Sierra · VIP Access</div>
    </header>

    <main class="hero">
      <section class="hero-content">
        <h1>CÓDIGO<br>ALFA VIP</h1>
        <p>No es un libro. Es la arquitectura operativa de disciplina y dominio mental para el 1%.</p>
        <img src="https://i.ibb.co/image-png-32786f6b-e769-44a7-8c6f-b17eedd2677e.png" alt="Guía VIP" class="guide-img">
      </section>

      <section class="vault-box">
        <h2>RECLAMAR ACCESO</h2>
        <form action="#" method="POST">
          <input type="text" placeholder="NOMBRE" required>
          <input type="email" placeholder="EMAIL PRIVADO" required>
          <button type="submit" class="btn-vip">OBTENER GUÍA AHORA</button>
        </form>
        <p style="font-size: 10px; color: #333; margin-top: 20px; letter-spacing: 1px;">
          PROCESO ENCRIPTADO · SIN SPAM
        </p>
      </section>
    </main>

    <footer>
      <span>© <span id="year"></span> CÓDIGO ALFA</span>
      <a href="mailto:codigo.alfa2.3@gmail.com" class="footer-contact">CONTACTO: CODIGO.ALFA2.3@GMAIL.COM</a>
    </footer>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
