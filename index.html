<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CÓDIGO ALFA VIP</title>

<style>
/* ========= RESET ========= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ========= BASE ========= */
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #000;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem;
  overflow-x: hidden;
}

/* ========= GLOW GLOBAL MÁS INTENSO ========= */
body::before {
  content: "";
  position: fixed;
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(255,215,0,0.25), transparent 70%);
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  filter: blur(120px);
  z-index: 0;
}

/* ========= HEADER ========= */
header {
  font-size: 0.75rem;
  color: #666;
  letter-spacing: 3px;
  text-align: center;
  margin-bottom: 2rem;
  z-index: 1;
}

/* ========= HERO ========= */
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  z-index: 1;
}

/* ========= TÍTULO ORO VIVO 24K ========= */
h1 {
  font-size: 2.6rem;
  font-weight: 900;
  background: linear-gradient(
    90deg,
    #fff8dc,
    #ffd700,
    #ffcc00,
    #fff2a8,
    #ffd700,
    #b8860b
  );
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: goldFlow 6s linear infinite;
  filter: drop-shadow(0 0 6px rgba(255,215,0,0.8))
          drop-shadow(0 0 20px rgba(255,215,0,0.4));
  letter-spacing: 3px;
}

/* Animación oro vivo */
@keyframes goldFlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

/* ========= SUBTÍTULO ========= */
.subtitle {
  margin-top: 1rem;
  font-size: 0.95rem;
  color: #bbb;
  max-width: 400px;
}

/* ========= EBOOK ========= */
.ebook {
  margin-top: 2rem;
  width: 170px;
  height: 250px;
  border: 1px solid rgba(255,215,0,0.7);
  border-radius: 10px;
  background: linear-gradient(145deg, #111, #000);
  box-shadow: 
    0 0 15px rgba(255,215,0,0.4),
    0 0 40px rgba(255,215,0,0.2);
}

/* ========= VAULT ========= */
.vault {
  margin-top: 2.5rem;
  width: 100%;
  max-width: 400px;
  padding: 2rem;
  background: rgba(20,20,20,0.6);
  border: 1px solid rgba(255,215,0,0.6);
  border-radius: 16px;
  backdrop-filter: blur(14px);
  position: relative;
  z-index: 1;
}

/* Glow más fuerte */
.vault::before {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(255,215,0,0.4), transparent 70%);
  top: -60px;
  left: 50%;
  transform: translateX(-50%);
  filter: blur(80px);
  z-index: -1;
}

/* ========= FORM ========= */
form {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,215,0,0.6);
  padding: 0.7rem 0;
  color: #fff;
  font-size: 0.9rem;
}

input::placeholder {
  color: #888;
  letter-spacing: 1px;
}

input:focus {
  outline: none;
  border-bottom: 1px solid #ffd700;
}

/* ========= BOTÓN ORO VIVO ========= */
button {
  margin-top: 1rem;
  padding: 1rem;
  background: linear-gradient(90deg, #ffd700, #ffcc00, #ffd700);
  border: none;
  color: #000;
  font-weight: 900;
  letter-spacing: 1.5px;
  border-radius: 40px;
  cursor: pointer;
  transition: 0.3s ease;
  box-shadow: 
    0 0 10px rgba(255,215,0,0.6),
    inset 0 0 5px rgba(255,255,255,0.5);
}

button:hover {
  background: linear-gradient(90deg, #fff2a8, #ffd700, #fff2a8);
  box-shadow: 
    0 0 25px rgba(255,215,0,1),
    0 0 50px rgba(255,215,0,0.6);
  transform: scale(1.03);
}

/* ========= SOCIAL PROOF ========= */
.social-proof {
  margin-top: 1.5rem;
  font-size: 0.8rem;
  color: #888;
  text-align: center;
}

/* ========= RESPONSIVE ========= */
@media(min-width: 768px) {
  h1 {
    font-size: 4.5rem;
  }

  .subtitle {
    font-size: 1.1rem;
  }

  .ebook {
    width: 220px;
    height: 320px;
  }
}
</style>
</head>

<body>

<header>EL 1% NO COMPITE, DOMINA</header>

<section class="hero">
  <h1>CÓDIGO ALFA VIP</h1>
  <div class="ebook"></div>
  <p class="subtitle">
    El Manifiesto del 1%: Deja de competir y empieza a liderar.
  </p>
</section>

<section class="vault">
  <form>
    <input type="text" placeholder="NOMBRE" required>
    <input type="email" placeholder="EMAIL PRIVADO" required>
    <button type="submit">RECLAMAR ACCESO VIP</button>
  </form>
</section>

<div class="social-proof">
  Únete a los +4,500 hombres que ya dominan su psicología.
</div>

</body>
</html>
