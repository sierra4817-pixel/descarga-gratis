<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page - Domina Tu Camino</title>
    <style>
        /* Estilos Generales */
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: #ffffff;
        }

        /* Contenedor Principal */
        .card {
            background-color: #0a0a0a;
            border: 1px solid #d4af37; /* Borde dorado fino */
            border-radius: 20px;
            padding: 40px 25px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }

        /* Etiqueta Superior */
        .badge {
            background-color: #c5a03d;
            color: #000;
            font-size: 12px;
            font-weight: bold;
            padding: 6px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Títulos */
        h1 {
            color: #d4af37;
            font-size: 28px;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 15px;
            line-height: 1.5;
            color: #cccccc;
            margin-bottom: 30px;
        }

        p strong {
            color: #ffffff;
        }

        /* Formulario */
        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box; /* Asegura que el padding no rompa el ancho */
            font-size: 16px;
        }

        /* Botón */
        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: #c5a03d;
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #e6bc4b;
        }

        /* Pie de página */
        .footer-text {
            font-size: 11px;
            color: #666;
            margin-top: 25px;
        }

        .lock-icon {
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="badge">Acceso Exclusivo</div>
        
        <h1>Domina tu<br>camino</h1>
        
        <p>Introduce tu email para recibir <strong>GRATIS</strong> el Ebook:<br>
        <strong>"La Estructura del 1%: El manual para hombres de alto valor"</strong>.</p>

        <form action="#">
            <input type="text" placeholder="Tu nombre" required>
            <input type="email" placeholder="Tu mejor correo" required>
            
            <button type="submit" class="btn-submit">Enviar Ebook a mi correo</button>
        </form>

        <div class="footer-text">
            <span>🔒</span> Tu información es privada. Únete a la comunidad de Código Alfa.
        </div>
    </div>

</body>
</html>
