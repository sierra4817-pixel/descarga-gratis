<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CÓDIGO ALFA VIP</title>

<!-- Fuente -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ========= RESET ========= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ========= BASE ========= */
body {
  font-family: 'Inter', sans-serif;
  background: #050505;
  color: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 2rem 1rem;
  overflow-x: hidden;
}

/* Glow ambiente */
body::before {
  content: "";
  position: fixed;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(246,226,122,0.15), transparent 70%);
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(100px);
  z-index: 0;
}

/* ========= CONTENEDOR ========= */
.vault {
  width: 100%;
  max-width: 420px;
  padding: 2.5rem 2rem;
  border-radius: 18px;
  backdrop-filter: blur(18px);
  background: rgba(255,255,255,0.03);
  border: 2px solid transparent;
  border-image: linear-gradient(to bottom, #cf9730, #f6e27a, #fef1a2, #f0d64d, #fcf6ba, #d19a39, #8a6e2f) 1;
  text-align: center;
  position: relative;
  z-index: 1;
}

/* ========= TÍTULO ORO 24K ========= */
h1 {
  font-family: 'Cinzel', serif;
  font-size: 2.6rem;
  letter-spacing: 2px;
  margin-bottom: 1.5rem;

  background: linear-gradient(to bottom, #cf9730 0%, #f6e27a 30%, #fef1a2 45%, #f0d64d 50%, #fcf6ba 55%, #d19a39 70%, #8a6e2f 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.8));

  text-shadow:
    0 0 2px rgba(255,215,0,0.4),
    0 0 6px rgba(255,215,0,0.3);
}

/* ========= EBOOK ========= */
.ebook {
  width: 160px;
  height: 240px;
  margin: 0 auto 1.5rem;
  border-radius: 10px;
  background: #0a0a0a;
  border: 2px solid;
  border-image: linear-gradient(to bottom, #cf9730, #f6e27a, #fef1a2, #f0d64d, #fcf6ba, #d19a39, #8a6e2f) 1;
  box-shadow: 
    0 0 10px rgba(246,226,122,0.3),
    0 0 30px rgba(246,226,122,0.15);
}

/* ========= TEXTO ========= */
.subtitle {
  font-size: 0.9rem;
  color: #cfcfcf;
  margin-bottom: 2rem;
}

/* ========= FORM ========= */
form {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(246,226,122,0.6);
  padding: 0.6rem 0;
  color: #f5f5f5;
  font-size: 0.9rem;
}

input::placeholder {
  color: #888;
  letter-spacing: 1px;
}

input:focus {
  outline: none;
  border-bottom: 1px solid #f6e27a;
}

/* ========= BOTÓN ORO ========= */
button {
  margin-top: 1rem;
  padding: 0.9rem;
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 1.5px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;

  background: linear-gradient(to bottom, #cf9730 0%, #f6e27a 30%, #fef1a2 45%, #f0d64d 50%, #fcf6ba 55%, #d19a39 70%, #8a6e2f 100%);
  color: #000;

  box-shadow:
    0 2px 5px rgba(0,0,0,0.6),
    0 0 10px rgba(246,226,122,0.4);
}

button:hover {
  transform: scale(1.05);
  box-shadow:
    0 5px 15px rgba(246,226,122,0.7),
    0 0 30px rgba(246,226,122,0.5);
}

/* ========= RESPONSIVE ========= */
@media(min-width: 768px) {
  h1 {
    font-size: 3.8rem;
  }

  .ebook {
    width: 200px;
    height: 300px;
  }
}

</style>
</head>

<body>

<div class="vault">

  <h1>CÓDIGO ALFA VIP</h1>

  <div class="ebook"></div>

  <p class="subtitle">
    El Manifiesto del 1%: Deja de competir y empieza a liderar.
  </p>

  <form>
    <input type="text" placeholder="NOMBRE" required>
    <input type="email" placeholder="EMAIL PRIVADO" required>
    <button type="submit">DESCARGAR CÓDIGO ALFA</button>
  </form>

</div>

</body>
</html>
