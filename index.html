<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Alfa VIP</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0a0a0a;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #111;
        padding: 40px;
        border-radius: 12px;
        max-width: 400px;
        width: 90%;
        text-align: center;
        box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    h1 {
        font-size: 26px;
        margin-bottom: 10px;
        color: #f5c542;
    }

    p {
        font-size: 14px;
        color: #ccc;
        margin-bottom: 25px;
    }

    input {
        width: 100%;
        padding: 14px;
        margin-bottom: 15px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
    }

    button {
        width: 100%;
        padding: 14px;
        background: #f5c542;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #d4a82f;
    }

    .small {
        font-size: 12px;
        color: #777;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>CÓDIGO ALFA VIP</h1>
    <p>Acceso privado. Solo para quienes van un paso adelante. Introduce tu email y recibe tu código exclusivo.</p>

    <form action="https://TU_ENDPOINT_AQUI.com" method="POST">
        <input type="email" name="email" placeholder="Introduce tu email" required>
        <button type="submit">QUIERO MI ACCESO VIP</button>
    </form>

    <div class="small">
        Cupos limitados. No es para todos.
    </div>
</div>

</body>
</html>
