<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CÓDIGO ALFA VIP | Acceso Exclusivo</title>
  
  <style>
    /* VARIABLES PREMIUM */
    :root {
      --bg: #000000;
      --card: #0A0A0A;
      --gold: #AD935B; /* Oro táctico */
      --text: #FFFFFF;
      --muted: #555555;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.4;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 60px 20px; flex: 1; }

    /* CABECERA */
    header { 
      text-align: center; 
      margin-bottom: 80px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
    }
    .logo-img { 
      width: 100px; 
      height: auto; 
      margin-bottom: 20px;
      border: 1px solid #1a1a1a;
      padding: 5px;
    }
    .brand-tag { 
      font-size: 12px; 
      letter-spacing: 6px; 
      text-transform: uppercase; 
      color: var(--gold);
      font-weight: 400;
    }

    /* LAYOUT HERO */
    .hero { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 60px; 
      align-items: center; 
    }

    .hero-text h1 {
      font-size: clamp(40px, 6vw, 68px);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -3px;
      margin-bottom: 25px;
      text-transform: uppercase;
    }
    .hero-text p {
      font-size: 18px;
      color: #777;
      max-width: 400px;
      margin-bottom: 30px;
      font-weight: 300;
    }

    /* FORMULARIO VAULT */
    .vault-card {
      background: var(--card);
      border: 1px solid #151515;
      padding: 50px;
      position: relative;
    }
    .vault-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 2px;
      background: var(--gold);
    }

    h2 { font-size: 20px; margin-bottom: 35px; letter-spacing: 2px; font-weight: 600; }

    input {
      width: 100%;
      padding: 15px 0;
      margin-bottom: 30px;
      background: transparent;
      border: none;
      border-bottom: 1px solid #222;
      color: white;
      font-size: 16px;
      transition: 0.3s;
    }
    input:focus { border-bottom-color: var(--gold); outline: none; }

    .btn-vip {
      width: 100%;
      padding: 20px;
      background: var(--gold);
      color: #000;
      border: none;
      font-weight: 900;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 3px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-vip:hover { filter: brightness(1.2); transform: translateY(-2px); }

    /* IMAGEN DE LA GUÍA */
    .guide-preview {
      width: 100%;
      max-width: 300px;
      margin-top: 20px;
      filter: grayscale(0.2) contrast(1.1);
      border: 1px solid #111;
    }

    /* FOOTER */
    footer {
      padding: 60px 20px;
      border-top: 1px solid #111;
      text-align: center;
      font-size: 11px;
      color: #333;
      letter-spacing: 2px;
    }
    .email-link { color: #555; text-decoration: none; display: block; margin-top: 10px; }

    /* RESPONSIVE */
    @media (max-width: 850px) {
      .hero { grid-template-columns: 1fr; text-align: center; }
      .hero-text p { margin-inline: auto; }
      .hero-text h1 { font-size: 45px; }
      .guide-preview { margin-inline: auto; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <img src="https://i.postimg.cc/mD8mK0z6/image.png" alt="Logo Código Alfa" class="logo-img">
      <div class="brand-tag">Albert Sierra · VIP Access</div>
    </header>

    <main class="hero">
      <section class="hero-text">
        <h1>CÓDIGO<br>ALFA VIP</h1>
        <p>Arquitectura operativa de disciplina y dominio mental para hombres de alto valor.</p>
        <img src="https://i.postimg.cc/qR8XFzD0/image.png" alt="Guía VIP" class="guide-preview">
      </section>

      <section class="vault-card">
        <h2>RECLAMAR ACCESO</h2>
        <form action="#" method="POST">
          <input type="text" placeholder="NOMBRE COMPLETO" required>
          <input type="email" placeholder="EMAIL PRIVADO" required>
          <button type="submit" class="btn-vip">Obtener Guía Ahora</button>
        </form>
        <p style="font-size: 9px; color: #222; margin-top: 25px; letter-spacing: 1px; text-align: center;">
          SISTEMA ENCRIPTADO · ACCESO INMEDIATO
        </p>
      </section>
    </main>
  </div>

  <footer>
    <p>© <span id="year"></span> CÓDIGO ALFA</p>
    <a href="mailto:codigo.alfa2.3@gmail.com" class="email-link">SOPORTE: CODIGO.ALFA2.3@GMAIL.COM</a>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
