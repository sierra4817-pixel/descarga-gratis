<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CÓDIGO ALFA</title>

<!-- Tipografías -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ================= BASE ================= */
body {
  font-family: 'Inter', sans-serif;
  background: #000;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.5rem 1rem;
  overflow-x: hidden;
}

/* Glow ambiental */
body::before {
  content: "";
  position: fixed;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(212,175,55,0.15), transparent 70%);
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: blur(100px);
  z-index: 0;
}

/* ================= TOP BAR ================= */
.topbar {
  font-size: 0.75rem;
  letter-spacing: 2px;
  margin-bottom: 2rem;

  /* Oro */
  background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5e6 75%, #aa771c 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  filter: drop-shadow(0 0 8px rgba(212,175,55,0.4));
}

/* ================= HERO ================= */
.hero {
  text-align: center;
  z-index: 1;
}

/* Título principal oro */
h1 {
  font-size: 2.8rem;
  font-weight: 800;
  letter-spacing: 2px;

  background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5e6 75%, #aa771c 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  filter: drop-shadow(0 0 8px rgba(212,175,55,0.4));
}

/* Subtítulo */
.subtitle {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: #888;
  margin-top: 0.5rem;
}

/* ================= EBOOK DISPLAY ================= */
.ebook {
  margin: 2rem auto;
  width: 180px;
  height: 260px;
  border-radius: 12px;
  background: #0a0a0a;

  border: 2px solid transparent;
  border-image: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5e6, #aa771c) 1;

  box-shadow:
    0 0 15px rgba(212,175,55,0.2),
    0 0 40px rgba(212,175,55,0.1);
}

/* ================= VAULT ================= */
.vault {
  width: 100%;
  max-width: 400px;
  background: #0a0a0a;
  border-radius: 16px;
  padding: 2rem;
  z-index: 1;
}

/* ================= FORM ================= */
form {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

/* Inputs minimalistas */
input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(212,175,55,0.5);
  padding: 0.7rem 0;
  color: #fff;
  font-size: 0.9rem;
}

input::placeholder {
  color: #777;
}

input:focus {
  outline: none;
  border-bottom: 1px solid #ffd700;
}

/* ================= BOTÓN CTA ================= */
button {
  margin-top: 1rem;
  padding: 1rem;
  border: none;
  border-radius: 30px;
  cursor: pointer;

  font-weight: 800;
  letter-spacing: 1.2px;
  color: #000;

  background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5e6 75%, #aa771c 100%);

  box-shadow:
    0 0 10px rgba(212,175,55,0.4),
    inset 0 0 5px rgba(255,255,255,0.4);

  transition: all 0.3s ease;
}

/* Efecto pulso brillo */
button:hover {
  transform: scale(1.05);
  box-shadow:
    0 0 25px rgba(212,175,55,0.8),
    0 0 50px rgba(212,175,55,0.5);
}

/* ================= RESPONSIVE ================= */
@media(min-width: 768px) {

  h1 {
    font-size: 4.5rem;
  }

  .ebook {
    width: 220px;
    height: 320px;
  }

}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  EL 1% NO COMPITE, DOMINA.
</div>

<!-- HERO -->
<section class="hero">

  <!-- TÍTULO -->
  <h1>CÓDIGO ALFA</h1>

  <!-- SUBTÍTULO -->
  <p class="subtitle">El Manifiesto del 1%</p>

  <!-- EBOOK -->
  <div class="ebook"></div>

</section>

<!-- FORMULARIO -->
<section class="vault">
  <form>

    <!-- INPUT NOMBRE -->
    <input type="text" placeholder="NOMBRE" required>

    <!-- INPUT EMAIL -->
    <input type="email" placeholder="EMAIL PRIVADO" required>

    <!-- BOTÓN CTA -->
    <button type="submit">RECLAMAR ACCESO ÉLITE</button>

  </form>
</section>

</body>
</html>
