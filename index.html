<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CÓDIGO ALFA VIP | El Manifiesto del 1%</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro-fondo: #000000;
            --texto-claro: #f0f0f0;
            /* Degradado de oro con múltiples reflejos según la imagen */
            --oro-gradiente: linear-gradient(
                to bottom, 
                #fcf6ba 0%, 
                #bf953f 25%, 
                #fcf6ba 50%, 
                #bf953f 75%, 
                #aa771c 100%
            );
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--negro-fondo);
            margin: 0;
            color: var(--texto-claro);
        }

        /* ESTILO DEL TÍTULO IGUAL A LA IMAGEN */
        .titulo-alfa {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            margin: 0;
            letter-spacing: -1px;
            
            /* Efecto Metálico */
            background: var(--oro-gradiente);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            
            /* Sombra para dar relieve y nitidez */
            filter: drop-shadow(0px 4px 2px rgba(0, 0, 0, 0.8));
            
            /* Ajuste de nitidez */
            -webkit-font-smoothing: antialiased;
        }

        .hero {
            padding: 150px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            border-bottom: 2px solid #bf953f;
        }

        .subheadline {
            font-size: 1.2rem;
            color: #bf953f;
            margin-top: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1 class="titulo-alfa">CÓDIGO ALFA VIP</h1>
        <p class="subheadline">El Manifiesto del 1%</p>
    </header>

</body>
</html>
