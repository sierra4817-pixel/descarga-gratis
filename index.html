<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código Alfa | Ebook Gratuito</title>
    <style>
        /* ESTÉTICA CÓDIGO ALFA: NEGRO Y DORADO */
        body { 
            background-color: #080808; 
            color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px;
        }

        .card { 
            max-width: 420px; 
            width: 100%; 
            background: #121212; 
            border: 1px solid #c5a02e; /* Dorado Mate */
            padding: 40px 30px; 
            border-radius: 15px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); 
            text-align: center;
        }

        .badge {
            background-color: #c5a02e;
            color: #000;
            font-size: 10px;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 20px;
        }

        h1 { 
            font-size: 28px; 
            margin: 0 0 15px 0; 
            letter-spacing: 2px; 
            color: #c5a02e; 
            text-transform: uppercase;
        }

        p { 
            color: #b0b0b0; 
            font-size: 16px; 
            line-height: 1.6; 
            margin-bottom: 30px; 
        }

        /* FORMULARIO */
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            background: #1a1a1a; 
            color: #fff; 
            font-size: 16px; 
            box-sizing: border-box; 
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #c5a02e; }

        button { 
            background-color: #c5a02e; 
            color: #000; 
            padding: 18px; 
            border: none; 
            border-radius: 8px; 
            width: 100%; 
            font-weight: 900; 
            font-size: 15px; 
            text-transform: uppercase; 
            cursor: pointer; 
            letter-spacing: 1px;
            transition: 0.4s;
        }

        button:hover { 
            background-color: #fff; 
            transform: scale(1.02); 
        }

        .disclaimer { 
            font-size: 11px; 
            color: #555; 
            margin-top: 25px; 
        }

        strong { color: #fff; }
    </style>
</head>
<body>

    <div class="card">
        <div class="badge">Acceso Exclusivo</div>
        <h1>DOMINA TU CAMINO</h1>
        <p>Introduce tu email para recibir <strong>GRATIS</strong> el Ebook: <br><strong>"La Estructura del 1%: El manual para hombres de alto valor"</strong>.</p>
        
        <form action="#" method="POST">
            <input type="text" name="Nombre" placeholder="Tu nombre" required>
            <input type="email" name="Email" placeholder="Tu mejor correo" required>
            <button type="submit">Enviar Ebook a mi correo</button>
        </form>
        
        <div class="disclaimer">
            🔒 Tu información es privada. Únete a la comunidad de Código Alfa.
        </div>
    </div>

</body>
</html>
