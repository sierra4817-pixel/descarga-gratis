<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CÓDIGO ALFA VIP — Acceso Directo</title>
  
  <style>
    :root {
      --bg: #05050A;
      --gold: #C9A227;
      --text: #EEF0F6;
      --muted: #A6AEC0;
      --card: #0E1016;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; flex: 1; }

    /* Cabecera ultra-simple */
    header { text-align: center; margin-bottom: 40px; }
    .logo-text { font-weight: 900; letter-spacing: 2px; color: var(--gold); font-size: 20px; }

    /* Sección Principal */
    .hero { text-align: center; margin-bottom: 50px; }
    h1 { font-size: 38px; margin-bottom: 15px; line-height: 1.2; }
    .subtitle { color: var(--muted); font-size: 18px; margin-bottom: 30px; }

    /* Caja de descarga (Donde ocurre la magia) */
    .download-box {
      background: var(--card);
      border: 1px solid rgba(201, 162, 39, 0.3);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
    }

    /* Imagen o Icono de la Guía */
    .guide-icon {
      background: linear-gradient(135deg, #1a1c24 0%, #05050a 100%);
      height: 250px;
      border-radius: 12px;
      border: 1px solid var(--gold);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 30px rgba(201,162,39,0.1);
    }

    /* Formulario */
    form { display: grid; gap: 15px; }
    input {
      padding: 15px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 16px;
    }
    input:focus { border-color: var(--gold); outline: none; background: rgba(255,255,255,0.08); }

    .btn {
      background: var(--gold);
      color: black;
      padding: 18px;
      border-radius: 10px;
      border: none;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      text-transform: uppercase;
    }
    .btn:hover { transform: scale(1.02); filter: brightness(1.1); }

    /* Pie de página */
    footer {
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
      color: var(--muted);
    }
    .contact-email { color: var(--gold); font-weight: bold; margin-top: 10px; display: block; text-decoration: none; }

    /* Responsive */
    @media (max-width: 700px) {
      .download-box { grid-template-columns: 1fr; padding: 25px; }
      h1 { font-size: 28px; }
      .guide-icon { height: 180px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="logo-text">CÓDIGO ALFA</div>
    </header>

    <main>
      <div class="hero">
        <h1>Tu Guía Gratuita está lista</h1>
        <p class="subtitle">Aprende los 3 pilares de la disciplina inquebrantable hoy mismo.</p>
      </div>

      <div class="download-box">
        <div class="guide-icon">
          <div style="font-size: 40px; margin-bottom: 10px;">🛡️</div>
          <div style="font-weight: 900; letter-spacing: 1px;">GUÍA ALFA</div>
          <div style="font-size: 12px; opacity: 0.6; margin-top: 5px;">PDF DESCARGABLE</div>
        </div>

        <div class="form-container">
          <form action="#" method="POST">
            <input type="text" placeholder="Tu nombre" required>
            <input type="email" placeholder="Tu mejor correo electrónico" required>
            <button type="submit" class="btn">Recibir Guía Ahora</button>
            <p style="font-size: 12px; color: var(--muted); text-align: center; margin-top: 10px;">
              Envío instantáneo por email.
            </p>
          </form>
        </div>
      </div>
    </main>
  </div>

  <footer>
    <p>© <span id="year"></span> Albert Sierra · CÓDIGO ALFA</p>
    <p>¿Tienes dudas? Escríbenos a:</p>
    <a href="mailto:codigo.alfa2.3@gmail.com" class="contact-email">codigo.alfa2.3@gmail.com</a>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

</body>
</html>
