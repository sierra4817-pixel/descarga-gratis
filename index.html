<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CÓDIGO ALFA VIP — Excelencia Estratégica</title>

<style>
:root {
  --bg: #030305;

  /* Oro real multicapa */
  --gold-1: #7a5c2e;
  --gold-2: #c9a96a;
  --gold-3: #f5e2b8;
  --gold-4: #a67c2e;
  --gold-5: #fff2cc;

  --gold-gradient: linear-gradient(
    135deg,
    var(--gold-1) 0%,
    var(--gold-2) 20%,
    var(--gold-3) 40%,
    var(--gold-4) 60%,
    var(--gold-2) 80%,
    var(--gold-5) 100%
  );

  --white: #fff;
  --glass: rgba(255,255,255,0.02);
  --border: rgba(197,160,89,0.2);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--white);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Fondo glow premium */
.glow-bg {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,215,0,0.08), transparent 40%),
    radial-gradient(circle at 70% 0%, rgba(197,160,89,0.06), transparent 50%);
  z-index: -1;
}

.container {
  max-width: 1100px;
  width: 100%;
  padding: 60px 20px;
}

/* Header */
header {
  text-align: center;
  margin-bottom: 60px;
}

.logo-main {
  width: 110px;
  margin-bottom: 15px;
  filter: drop-shadow(0 0 15px rgba(197,160,89,0.25));
}

.brand-title {
  font-size: 12px;
  letter-spacing: 6px;
  color: var(--gold-2);
}

/* Hero */
.hero {
  text-align: center;
  margin-bottom: 60px;
}

h1 {
  font-size: clamp(36px, 7vw, 64px);
  font-weight: 800;
  letter-spacing: -2px;
}

/* Oro animado */
.gold-gradient {
  background: var(--gold-gradient);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine 4s linear infinite;
}

@keyframes shine {
  to { background-position: 200% center; }
}

.subtitle {
  margin-top: 15px;
  color: rgba(255,255,255,0.5);
}

/* Card */
.premium-card {
  position: relative;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border-radius: 28px;
  border: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr 1.1fr;
  overflow: hidden;
}

/* borde glow */
.premium-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 28px;
  padding: 1px;
  background: linear-gradient(120deg, transparent, rgba(255,215,0,0.25), transparent);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
}

/* Lado visual */
.visual-side {
  padding: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.guide-mockup {
  max-width: 260px;
  border-radius: 12px;
  border: 1px solid rgba(197,160,89,0.3);
  box-shadow: 0 30px 60px rgba(0,0,0,0.6);
  transition: 0.4s;
}

.premium-card:hover .guide-mockup {
  transform: translateY(-8px) rotate(-2deg);
}

/* Form */
.form-side {
  padding: 50px;
}

.input-field {
  width: 100%;
  padding: 18px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: white;
}

.input-field:focus {
  border-color: var(--gold-2);
  outline: none;
}

/* Botón metálico */
.cta-button {
  width: 100%;
  padding: 20px;
  border-radius: 12px;
  border: none;

  background: linear-gradient(
    145deg,
    #f5e2b8 0%,
    #c9a96a 30%,
    #a67c2e 60%,
    #fff2cc 100%
  );

  color: #000;
  font-weight: 800;
  letter-spacing: 2px;
  cursor: pointer;
  transition: 0.3s;

  box-shadow:
    inset 0 1px 2px rgba(255,255,255,0.5),
    inset 0 -2px 4px rgba(0,0,0,0.5),
    0 10px 30px rgba(197,160,89,0.3);
}

.cta-button:hover {
  transform: translateY(-3px);
  filter: brightness(1.1);
}

/* textos */
.meta {
  text-align: center;
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.5;
}

footer {
  margin-top: 60px;
  text-align: center;
  font-size: 12px;
  opacity: 0.3;
}

@media(max-width:850px){
  .premium-card {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="glow-bg"></div>

<div class="container">

<header>
  <img src="https://i.ibb.co/image-png-4e57df51-d15b-43b3-8d19-87a051725aa2.png" class="logo-main">
  <div class="brand-title">ALBERT SIERRA</div>
</header>

<section class="hero">
  <h1 class="gold-gradient">CÓDIGO ALFA VIP</h1>
  <p class="subtitle">Acceso estratégico reservado para perfiles de alto rendimiento.</p>
</section>

<div class="premium-card">

  <div class="visual-side">
    <img src="https://i.ibb.co/image-png-32786f6b-e769-44a7-8c6f-b17eedd2677e.png" class="guide-mockup">
  </div>

  <div class="form-side">
    <h3>Solicitar acceso</h3>

    <form>
      <input type="text" class="input-field" placeholder="Nombre completo" required>
      <input type="email" class="input-field" placeholder="Email" required>

      <button class="cta-button">RECLAMAR ACCESO VIP</button>

      <p class="meta">⏳ Acceso limitado hoy</p>
      <p class="meta">+1,284 solicitudes procesadas</p>
    </form>
  </div>

</div>

<footer>
© 2026 Código Alfa
</footer>

</div>

</body>
</html>
